<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR1 Shell Center Preview (Review Artifact)</title>
    <style>
      :root {
        --bg-main: #161616;
        --bg-panel: #1e1e1e;
        --bg-panel-hover: #2a2a2a;
        --border-subtle: rgba(255,255,255,0.06);
        --text-normal: #dcddde;
        --text-muted: #848484;
        --accent-mora: #a78bfa;
      }
      * { box-sizing: border-box; }
      body { margin: 0; height: 100vh; background: var(--bg-main); color: var(--text-normal); font-family: "Segoe UI", Arial, sans-serif; }
      .workspace-shell { display: grid; grid-template-columns: 48px minmax(220px,300px) minmax(0,1fr) minmax(280px,360px) 48px; height: 100vh; }
      .rail { background: var(--bg-panel); border-inline: 1px solid var(--border-subtle); }
      .panel-placeholder { background: var(--bg-panel); border-inline-end: 1px solid var(--border-subtle); padding: 0.75rem; color: var(--text-muted); }
      .center-column { display: flex; flex-direction: column; min-height: 0; }
      .tab-strip { flex: 0 0 36px; display: flex; align-items: center; gap: 0.5rem; padding: 0 0.5rem; border-bottom: 1px solid var(--border-subtle); background: var(--bg-panel); }
      .top-toolbar { flex: 0 0 44px; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding: 0 0.5rem; border-bottom: 1px solid var(--border-subtle); background: var(--bg-panel); }
      .canvas { flex: 1 1 auto; min-height: 0; display: grid; place-items: center; color: var(--text-muted); }
      button { min-height: 44px; border: 1px solid var(--border-subtle); background: transparent; color: var(--text-normal); }
      button:focus-visible { outline: 2px solid var(--accent-mora); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }
    </style>
  </head>
  <body>
    <main class="workspace-shell" aria-label="PR1 review preview">
      <aside class="rail" aria-label="Left rail"></aside>
      <aside class="panel-placeholder">Left panel placeholder (PR2)</aside>
      <section class="center-column">
        <div class="tab-strip"><button>Vista gráfica</button><button>+</button></div>
        <div class="top-toolbar">
          <span>Acme · 5 nodes · 3 edges</span>
          <div><button id="zoom-fit">Zoom to fit</button><button id="theme-toggle">Theme</button></div>
        </div>
        <div class="canvas" id="network">#network canvas area</div>
      </section>
      <aside class="panel-placeholder">Right panel placeholder (PR3)</aside>
      <aside class="rail" aria-label="Right rail"></aside>
    </main>
  </body>
</html>
