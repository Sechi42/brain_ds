<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR1.5 Chrome Polish Preview (Review Artifact)</title>
    <!-- Tokens and shared component CSS from design references — NOT inlined -->
    <link rel="stylesheet" href="../../../../brain_ds/ui/design/sections/_tokens.css" />
    <link rel="stylesheet" href="../../../../brain_ds/ui/design/sections/_shared.css" />
    <style>
      /* ── Page chrome ── */
      html, body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: var(--bg-main);
        color: var(--text-normal);
        font-family: Aptos, "Segoe UI Variable", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 15px;
        line-height: 1.45;
      }

      /* ── Workspace shell (preview — center only, left/right are placeholders) ── */
      .workspace-shell {
        display: grid;
        grid-template-columns: 48px minmax(220px,300px) minmax(0,1fr) minmax(280px,360px) 48px;
        grid-template-rows: 1fr;
        height: 100vh;
      }
      .rail {
        background: var(--bg-panel);
        border-inline: 1px solid var(--border-subtle);
      }
      .panel-placeholder {
        background: var(--bg-panel);
        border-inline-end: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.82rem;
      }
      .panel-placeholder--right {
        border-inline-start: 1px solid var(--border-subtle);
        border-inline-end: none;
      }

      /* ── Center column ── */
      .center-column {
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--bg-main);
      }

      /* ── Tab Strip — 36px (ADR-009 tablist exemption) ── */
      .tab-strip {
        flex: 0 0 36px;
        display: flex;
        align-items: stretch;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border-subtle);
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0 2px;
        gap: 1px;
      }
      .tab-item {
        position: relative;
        display: inline-flex;
        align-items: center;
        height: 36px;
        max-width: 180px;
        background: var(--bg-panel);
        transition: background 200ms ease;
      }
      .tab {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0 1.7rem 0 0.55rem;
        min-width: 80px;
        max-width: 180px;
        height: 36px;
        background: transparent;
        color: var(--text-muted);
        border: none;
        border-radius: 0;
        cursor: pointer;
        font-size: 0.82rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: inherit;
        transition: color 200ms ease;
      }
      .tab-item[data-tab-active='true'] {
        background: var(--bg-main);
        box-shadow: inset 0 -2px 0 var(--accent-mora);
      }
      .tab-item[data-tab-active='true'] .tab {
        color: var(--text-bright);
      }
      .tab-item:hover:not([data-tab-active='true']) {
        background: var(--bg-panel-hover);
      }
      .tab-item:hover:not([data-tab-active='true']) .tab {
        color: var(--text-normal);
      }
      .tab-close {
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border-radius: 3px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        position: absolute;
        right: 6px;
        top: 9px;
        opacity: 0;
        transition: opacity 0.1s ease, background 0.1s ease;
      }
      .tab-item[data-tab-active='true'] .tab-close {
        opacity: 1;
        color: var(--text-muted);
      }
      .tab-item:hover .tab-close {
        opacity: 1;
      }
      .tab-close:hover {
        background: var(--bg-active);
        color: var(--text-bright);
      }
      .tab-new {
        display: grid;
        place-items: center;
        width: 44px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        flex-shrink: 0;
        border-radius: 0;
        padding: 0;
        transition: background 200ms ease, color 200ms ease;
      }
      .tab-new:hover {
        background: var(--bg-panel-hover);
        color: var(--text-normal);
      }

      /* ── Top Toolbar — 44px LOCKED (ADR-001) ── */
      .top-toolbar {
        flex: 0 0 44px;
        display: flex;
        align-items: center;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border-subtle);
        gap: 0;
        padding: 0 4px;
      }
      [data-toolbar-zone='nav'] {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0;
      }
      [data-toolbar-zone='view'] {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 0 8px;
        font-size: 0.82rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      [data-toolbar-zone='overflow'] {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      [data-toolbar-zone='system-chrome'] {
        width: 0;
        flex-shrink: 0;
      }
      .toolbar-btn {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        background: transparent;
        color: var(--text-muted);
        border: none;
        border-radius: var(--radius-ui);
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: background 200ms ease, color 200ms ease;
      }
      .toolbar-btn:hover {
        background: var(--bg-panel-hover);
        color: var(--text-normal);
      }
      .toolbar-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      :focus-visible {
        outline: 2px solid var(--accent-mora);
        outline-offset: 2px;
      }

      /* ── Canvas Area ── */
      .canvas-area {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        overflow: hidden;
        background: var(--bg-main);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      /* ── Reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        .tab-item, .tab, .tab-close, .tab-new, .toolbar-btn { transition: none; animation: none; }
      }
    </style>
  </head>
  <body>

    <!-- ═══════════════════════════════════════════════════════════════════
         PR1.5 Chrome Polish Preview
         Center column chrome only — left/right panels are PR2/PR3 placeholders.
         Compare against: brain_ds/ui/design/sections/section-4-center-canvas.html
    ════════════════════════════════════════════════════════════════════ -->
    <main class="workspace-shell" aria-label="PR1.5 chrome polish preview">

      <!-- Left rail (PR2 placeholder) -->
      <aside class="rail" aria-label="Left rail"></aside>

      <!-- Left panel (PR2 placeholder) -->
      <div class="panel-placeholder" aria-label="Left panel — PR2">PR2 placeholder</div>

      <!-- Center column — PR1.5 chrome -->
      <section class="center-column">

        <!-- ── Tab Strip (36px, tablist semantics — ADR-009) ── -->
        <div class="tab-strip" role="tablist" aria-label="Open graphs" aria-orientation="horizontal">

          <!-- Active tab: Vista gráfica -->
          <div class="tab-item" data-tab-id="tab-vista-grafica" data-tab-active="true">
            <button
              class="tab"
              role="tab"
              id="tab-vista-grafica"
              aria-selected="true"
              aria-controls="canvas-area"
              tabindex="0"
            >
              <span class="tab-label">Vista gráfica</span>
            </button>
            <button
              class="tab-close"
              aria-label="Close tab Vista gráfica"
              data-catalog-id="tab-close"
              tabindex="-1"
            >
              <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <!-- Inactive tab: alpha -->
          <div class="tab-item" data-tab-id="tab-alpha" data-tab-active="false">
            <button
              class="tab"
              role="tab"
              id="tab-alpha"
              aria-selected="false"
              aria-controls="canvas-area"
              tabindex="-1"
            >
              <span class="tab-label">alpha</span>
            </button>
            <button
              class="tab-close"
              aria-label="Close tab alpha"
              data-catalog-id="tab-close"
              tabindex="-1"
            >
              <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <!-- New-tab button -->
          <button class="tab-new" aria-label="New tab" data-catalog-id="tab-new" tabindex="0">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>

        </div><!-- /.tab-strip -->

        <!-- ── Top Toolbar (44px LOCKED — ADR-001) ── -->
        <div class="top-toolbar" role="toolbar" aria-label="Canvas toolbar">

          <!-- Zone: nav -->
          <div data-toolbar-zone="nav">
            <button class="toolbar-btn" aria-label="Back" data-catalog-id="nav-back">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
            </button>
            <button class="toolbar-btn" aria-label="Forward" data-catalog-id="nav-forward" disabled aria-disabled="true">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>

          <!-- Zone: view -->
          <div id="workspace-view-label" data-toolbar-zone="view" aria-label="Graph metadata">
            Acme Co &middot; 142 nodes &middot; 318 edges &middot; 2026-05-20
          </div>

          <!-- Zone: overflow -->
          <div data-toolbar-zone="overflow">
            <button class="toolbar-btn" aria-label="Zoom to fit" id="zoom-fit">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
              </svg>
            </button>
            <button class="toolbar-btn" aria-label="Switch to light theme" id="theme-toggle" aria-pressed="false">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
              </svg>
            </button>
            <button class="toolbar-btn" aria-label="More actions" data-catalog-id="overflow" aria-haspopup="menu">
              <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
              </svg>
            </button>
          </div>

          <!-- Zone: system-chrome — RESERVED -->
          <div data-toolbar-zone="system-chrome"><!-- reserved --></div>

        </div><!-- /.top-toolbar -->

        <!-- Canvas area placeholder -->
        <div class="canvas-area" id="canvas-area">
          #network canvas mount — vis.Network renders here at runtime
        </div>

      </section>

      <!-- Right panel (PR3 placeholder) -->
      <div class="panel-placeholder panel-placeholder--right" aria-label="Right panel — PR3">PR3 placeholder</div>

      <!-- Right rail (PR3 placeholder) -->
      <aside class="rail" aria-label="Right rail"></aside>

    </main>

    <script>
      /* Tab switching demo (same as section-4 reference) */
      (function () {
        var tabStrip = document.querySelector('[role="tablist"]');
        if (!tabStrip) return;
        tabStrip.addEventListener('click', function (e) {
          var btn = e.target.closest('[role="tab"]');
          if (!btn) return;
          tabStrip.querySelectorAll('.tab-item').forEach(function (item) {
            item.setAttribute('data-tab-active', 'false');
          });
          tabStrip.querySelectorAll('[role="tab"]').forEach(function (t) {
            t.setAttribute('aria-selected', 'false');
            t.setAttribute('tabindex', '-1');
          });
          var parentItem = btn.closest('.tab-item');
          if (parentItem) parentItem.setAttribute('data-tab-active', 'true');
          btn.setAttribute('aria-selected', 'true');
          btn.setAttribute('tabindex', '0');
          btn.focus();
        });
      }());

      /* Theme toggle demo */
      (function () {
        var toggle = document.getElementById('theme-toggle');
        var root = document.documentElement;
        if (!toggle) return;
        toggle.addEventListener('click', function () {
          var current = root.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', next);
          toggle.setAttribute('aria-pressed', next === 'light' ? 'true' : 'false');
          toggle.setAttribute('aria-label', next === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
        });
      }());
    </script>
  </body>
</html>
