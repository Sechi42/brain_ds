<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Section 1 — Left Shell (Design Reference)</title>
  <link rel="stylesheet" href="_tokens.css" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    html, body {
      margin: 0;
      height: 100vh;
      background: var(--bg-main);
      color: var(--text-normal);
      font-family: Aptos, "Segoe UI Variable", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      font-kerning: normal;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .section-1-frame {
      display: grid;
      grid-template-columns: 48px minmax(220px, 300px) 1fr;
      height: 100vh;
    }

    .left-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid var(--border-subtle);
      background: var(--bg-panel);
      padding: 2px 0;
    }

    .left-rail-icons {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 2px;
      padding-top: 4px;
    }

    .rail-icon svg {
      width: 18px;
      height: 18px;
    }

    .left-content-panel {
      background: var(--bg-panel);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      min-width: 220px;
      max-width: 300px;
    }

    .panel-header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.65rem;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-bright);
      font-size: 0.85rem;
      font-weight: 650;
      letter-spacing: 0.01em;
    }

    .panel-collapse {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-ui);
    }
    .panel-collapse:hover { background: var(--bg-panel-hover); color: var(--text-normal); }

    .workspace-name {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text-bright);
      padding: 0.85rem 0.75rem 0.75rem;
    }

    .panel-body {
      padding: 0.5rem;
      overflow: auto;
    }

    .canvas-filler {
      background: var(--bg-main);
      display: grid;
      place-items: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="section-1-frame" role="main" aria-label="Section 1 left shell demo">
    <nav class="left-rail" role="tablist" aria-orientation="vertical" aria-label="Left workspace rail" data-rail-side="left">
      <div class="left-rail-icons">
        <button class="rail-icon" role="tab" aria-selected="true" aria-label="Open file tree panel" data-rail-icon="file-tree" tabindex="0">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h5l2 2h11v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2"/></svg>
        </button>
        <button class="rail-icon" role="tab" aria-selected="false" aria-label="Open search panel" data-rail-icon="search" tabindex="-1">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="rail-icon" role="tab" aria-selected="false" aria-label="Open filters panel" data-rail-icon="filters" tabindex="-1">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
        </button>
        <button class="rail-icon" role="tab" aria-selected="false" aria-label="Open hierarchy panel" data-rail-icon="hierarchy" tabindex="-1">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM10 6h4M17 10v4"/></svg>
        </button>
        <button class="rail-icon" role="tab" aria-selected="false" aria-label="Open layout panel" data-rail-icon="layout" tabindex="-1">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="5"/><rect x="13" y="10" width="8" height="11"/><rect x="3" y="13" width="8" height="8"/></svg>
        </button>
      </div>

      <button class="status-chip" aria-label="Switch workspace (current: ACME)" aria-haspopup="menu" data-status-chip="org-code">ACME</button>
    </nav>

    <section class="left-content-panel" data-panel-module="file-tree" aria-label="Left content panel file tree">
      <header class="panel-header">
        <strong>Files</strong>
        <button class="panel-collapse" aria-label="Collapse left panel" aria-expanded="true" aria-pressed="false">⌃</button>
      </header>

      <div class="panel-body">
        <details class="tree-accordion" open data-accordion-section="vaults" data-accordion-open="true">
          <summary class="tree-summary workspace-name" aria-expanded="true">Acme Workspace</summary>
          <ul class="file-tree" role="tree" aria-label="Project file tree">
            <li class="tree-row tree-row-project" role="treeitem" aria-expanded="true" data-node-id="prj_acme_01" data-display-path="Acme/projects/brain-ds" data-node-type="project">
              <span class="tree-chevron" aria-hidden="true">▾</span>
              <span>brain-ds</span>
            </li>
            <li class="tree-row tree-row-graph" role="treeitem" data-node-id="grf_acme_01" data-display-path="Acme/projects/brain-ds/graph-main.json" data-node-type="graph">
              <span class="tree-indent" aria-hidden="true"></span>
              <span>graph-main</span>
            </li>
            <li class="tree-row tree-row-graph" role="treeitem" data-node-id="grf_acme_02" data-display-path="Acme/projects/brain-ds/graph-alt.json" data-node-type="graph">
              <span class="tree-indent" aria-hidden="true"></span>
              <span>graph-alt</span>
            </li>
            <li class="tree-row tree-row-project" role="treeitem" aria-expanded="true" data-node-id="prj_acme_02" data-display-path="Acme/projects/alpha" data-node-type="project">
              <span class="tree-chevron" aria-hidden="true">▾</span>
              <span>alpha</span>
            </li>
            <li class="tree-row tree-row-graph" role="treeitem" data-node-id="grf_acme_03" data-display-path="Acme/projects/alpha/market-map.json" data-node-type="graph">
              <span class="tree-indent" aria-hidden="true"></span>
              <span>market-map</span>
            </li>
            <li class="tree-row tree-row-graph" role="treeitem" data-node-id="grf_acme_04" data-display-path="Acme/projects/alpha/deps-map.json" data-node-type="graph">
              <span class="tree-indent" aria-hidden="true"></span>
              <span>deps-map</span>
            </li>
          </ul>
        </details>
      </div>
    </section>

    <aside class="canvas-filler" aria-label="Center area placeholder">Center canvas intentionally omitted in Section 1 reference</aside>
  </div>

  <script>
    const mockTreeData = [
      {
        id: "prj_acme_01",
        displayPath: "Acme/projects/brain-ds",
        type: "project",
        children: [
          { id: "grf_acme_01", displayPath: "Acme/projects/brain-ds/graph-main.json", type: "graph" },
          { id: "grf_acme_02", displayPath: "Acme/projects/brain-ds/graph-alt.json", type: "graph" }
        ]
      },
      {
        id: "prj_acme_02",
        displayPath: "Acme/projects/alpha",
        type: "project",
        children: [
          { id: "grf_acme_03", displayPath: "Acme/projects/alpha/market-map.json", type: "graph" },
          { id: "grf_acme_04", displayPath: "Acme/projects/alpha/deps-map.json", type: "graph" }
        ]
      }
    ];
    window.__section1MockTreeData = mockTreeData;
  </script>
</body>
</html>
