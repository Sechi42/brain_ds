<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brain_ds Graph Viewer</title>
    <script>
      (function () {
        var key = "brain_ds.theme";
        var stored = null;
        try { stored = localStorage.getItem(key); } catch (e) {}
        var initialTheme = (stored === "light" || stored === "dark") ? stored : "dark";
        document.documentElement.setAttribute("data-theme", initialTheme);
      })();
    </script>
    <style>
      __BRAIN_DS_THEME_TOKENS__
      __VIS_NETWORK_CSS__
      :root {
        color-scheme: dark;
        --surface-canvas: var(--theme-surface_canvas, var(--theme-background));
        --surface-panel: var(--theme-surface_panel, var(--theme-surface));
        --surface-chrome: var(--theme-surface_chrome, var(--theme-surface));
        --border-subtle: var(--theme-border_subtle, var(--theme-border));
        --border-emphasis: var(--theme-border_emphasis, var(--theme-focus_ring));
        --space-1: var(--theme-space_1, 0.25rem);
        --space-2: var(--theme-space_2, 0.5rem);
        --space-3: var(--theme-space_3, 0.75rem);
        --space-4: var(--theme-space_4, 1rem);
        --bg: var(--theme-background);
        --surface: var(--theme-surface);
        --surface-2: var(--theme-surface-elevated);
        --border: var(--theme-border);
        --text: var(--theme-text);
        --text-muted: var(--theme-text-muted);
        --focus: var(--theme-focus-ring);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); }
      .topbar { display: flex; flex-wrap: wrap; justify-content: space-between; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); background: var(--surface-chrome); min-height: 48px; }
      .meta { font-size: 0.92rem; color: var(--text-muted); }
      .layout { display: grid; grid-template-columns: minmax(260px, 320px) 1fr minmax(280px, 360px); gap: var(--space-3); padding: var(--space-3); }
      .panel { background: var(--surface-panel); border: 1px solid var(--border-subtle); border-radius: 10px; padding: var(--space-3); box-shadow: var(--shadow-sm); }
      .detail-panel { display: grid; gap: var(--space-3); align-content: start; max-height: calc(100vh - 110px); overflow: auto; transition: transform var(--duration-normal) var(--ease-standard), opacity var(--duration-normal) var(--ease-standard); animation: detail-panel-enter var(--duration-normal) var(--ease-standard); }
      body, .panel, .topbar, .button, button, #network, .detail-card, .evidence-item { transition: background-color var(--duration-normal) var(--ease-standard), color var(--duration-normal) var(--ease-standard), border-color var(--duration-normal) var(--ease-standard); }
      .detail-panel.is-collapsed { transform: translateX(101%); opacity: 0; pointer-events: none; }
      .detail-panel.is-empty .detail-body { color: var(--text-muted); }
      .detail-header { display: grid; gap: var(--space-1); }
      .detail-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; }
      .detail-actions button { min-width: 44px; }
      .detail-title { margin: 0; font-size: var(--font-lg); font-weight: var(--font-weight-semibold); color: var(--theme-text); }
      .detail-meta { color: var(--theme-text-muted); font-size: var(--font-sm); }
      .detail-body { display: grid; gap: var(--space-2); }
      .detail-card { border: 1px solid var(--theme-card-divider); border-left: 4px solid var(--theme-card-accent-border); border-radius: var(--theme-card-radius); padding: var(--space-2) var(--space-3); background: var(--theme-card-bg); }
      .detail-card h3 { margin: 0 0 var(--space-1); font-size: var(--font-sm); font-weight: var(--font-weight-semibold); color: var(--theme-text-muted); }
      .detail-card p { margin: 0; white-space: pre-wrap; }
      .card-icon { width: 16px; height: 16px; color: var(--text-muted); display: inline-block; margin-bottom: 0.2rem; }
      .detail-section { display: grid; gap: var(--space-2); }
      .detail-section h3 { margin: 0; font-size: var(--font-sm); font-weight: var(--font-weight-semibold); color: var(--theme-text-muted); }
      .detail-section-heading { display: inline-flex; align-items: center; gap: var(--space-2); }
      .detail-score-chip { display: inline-flex; align-items: center; justify-self: start; background: var(--state-info-bg); color: var(--state-info-fg); border-radius: var(--radius-pill); padding: var(--space-1) var(--space-2); font-size: var(--font-xs); font-weight: var(--font-weight-semibold); }
      .detail-ellipsis { display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
      .relationship-group { border-top: 1px solid var(--border); padding-top: var(--space-2); }
      .relationship-group h4 { margin: 0 0 var(--space-1); font-size: var(--font-sm); color: var(--text-muted); }
      .relationship-list { margin: 0; padding-left: var(--space-4); display: grid; gap: var(--space-1); }
      .relationship-reasons, .relationship-evidence { margin: var(--space-1) 0 0 0; color: var(--text-muted); font-size: var(--font-sm); }
      .evidence-list { display: grid; gap: var(--space-2); }
      .evidence-item { border: 1px solid var(--theme-card-divider); border-radius: var(--theme-card-radius); background: var(--theme-card-bg); }
      .evidence-item summary { cursor: pointer; padding: 0.5rem 0.65rem; min-height: 44px; display: flex; align-items: center; gap: 0.4rem; }
      .evidence-item > div { border-top: 1px solid var(--theme-card-divider); padding: 0.5rem 0.65rem; }
      .badge { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 0.08rem 0.45rem; font-size: 0.78rem; color: var(--text-muted); }
      .evidence-source { font-size: 0.85rem; color: var(--text-muted); }
      .controls { display: grid; gap: 0.75rem; align-content: start; max-height: calc(100vh - 110px); overflow: auto; }
      .control-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .button, button { min-height: 44px; padding: 0.45rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); color: var(--text); cursor: pointer; }
      .button:hover, button:hover { transition: background-color var(--duration-fast) var(--ease-standard), color var(--duration-fast) var(--ease-standard); }
      #score-threshold-slider::-webkit-slider-thumb { transition: left var(--duration-fast) var(--ease-standard); }
      #score-threshold-slider::-moz-range-thumb { transition: left var(--duration-fast) var(--ease-standard); }
      button[aria-pressed='true'] { border-color: var(--focus); }
      .filter-item { display: flex; align-items: center; gap: 0.5rem; margin: 0.35rem 0; min-height: 44px; }
      .chip { display: inline-flex; width: 14px; height: 14px; border-radius: 3px; }
      .legend-item { display: flex; align-items: center; gap: 0.5rem; min-height: 44px; }
      .legend-item button { width: 100%; text-align: left; }
      .search-group { position: relative; display: grid; gap: var(--space-2); }
      .search-input-wrap { position: relative; display: flex; align-items: center; }
      .search-input { width: 100%; padding-left: 2rem; padding-right: 1.9rem; }
      .search-icon { position: absolute; left: 0.5rem; color: var(--text-muted); pointer-events: none; display: inline-flex; }
      .search-icon-svg, .search-clear-icon { width: 14px; height: 14px; }
      .search-clear-btn { position: absolute; right: 0.3rem; min-height: unset; padding: 0.25rem; border: 0; background: transparent; color: var(--text-muted); }
      #search-results { margin: 0; padding: var(--space-1); list-style: none; display: none; position: absolute; z-index: 1201; width: 100%; background: var(--surface-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-md); box-shadow: var(--shadow-md); max-height: 260px; overflow: auto; }
      #search-results.is-open { display: block; }
      .search-option-btn { width: 100%; text-align: left; }
      .search-option.is-active .search-option-btn { background: var(--state-selected-bg); color: var(--state-selected-fg); }
      .search-empty { color: var(--text-muted); font-size: var(--font-sm); padding: var(--space-2); }
      .vis-context-menu { min-width: 220px; padding: var(--space-1); background: var(--surface-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); }
      .vis-context-menu__item { width: 100%; display: flex; align-items: center; gap: var(--space-2); text-align: left; border: 0; background: transparent; padding: var(--space-2); border-radius: var(--radius-sm); }
      .vis-context-menu__item:hover, .vis-context-menu__item--hovered { background: var(--state-hover-bg); color: var(--state-hover-fg); }
      .vis-context-menu__icon { width: 16px; height: 16px; display: inline-flex; }
      .vis-context-menu__icon svg { width: 16px; height: 16px; }
      .vis-context-menu__separator { border: 0; border-top: 1px solid var(--border-subtle); margin: var(--space-1) 0; }
      .menu-item--danger { color: var(--state-danger-fg); }
      .menu-item--danger:hover, .menu-item--danger.vis-context-menu__item--hovered { background: var(--state-danger-bg); color: var(--state-danger-fg); }
      .network-shell { position: relative; }
      #network { height: calc(100vh - 115px); border: 1px solid var(--border-subtle); border-radius: 10px; background: var(--surface-canvas); }
      .viewer-loading,
      .viewer-empty-state { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; text-align: center; border-radius: 10px; }
      .viewer-loading.is-visible,
      .viewer-empty-state.is-visible { display: flex; }
      .viewer-loading { background: color-mix(in srgb, var(--surface-panel) 80%, transparent); z-index: 20; opacity: 0; transition: opacity var(--duration-normal) var(--ease-standard); }
      .viewer-loading.is-visible { opacity: 1; }
      .viewer-loading.is-dismissing { opacity: 0; }
      .viewer-loading__spinner { width: 28px; height: 28px; color: var(--theme-text-muted); animation: viewer-spin 0.9s linear infinite; }
      .viewer-empty-state { z-index: 15; background: color-mix(in srgb, var(--surface-canvas) 94%, transparent); opacity: 0; transition: opacity var(--duration-normal) var(--ease-standard); }
      .viewer-empty-state.is-visible { opacity: 1; }
      .viewer-empty-state__card { max-width: 28rem; display: grid; gap: var(--space-2); justify-items: center; padding: var(--space-4); }
      .viewer-empty-state__icon { width: 20px; height: 20px; color: var(--theme-text-muted); }
      .viewer-empty-state__title { margin: 0; font-size: var(--font-xl); font-weight: var(--font-weight-semibold); }
      .viewer-empty-state__text { margin: 0; font-size: var(--font-sm); color: var(--theme-text-muted); }
      .detail-skeleton { display: grid; gap: var(--space-2); }
      .detail-skeleton__line { height: 12px; border-radius: var(--radius-sm); background: linear-gradient(90deg, var(--surface-panel) 0%, var(--surface-elevated) 50%, var(--surface-panel) 100%); background-size: 200% 100%; animation: detail-skeleton-shimmer 1.2s var(--ease-standard) infinite; }
      .detail-skeleton__line--1 { width: 60%; }
      .detail-skeleton__line--2 { width: 40%; }
      .detail-skeleton__line--3 { width: 25%; }
      @keyframes detail-skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @keyframes viewer-spin { to { transform: rotate(360deg); } }
      @keyframes detail-panel-enter { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .detail-panel-backdrop { display: none; }
      :focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) {
        .detail-panel { transition: none; animation: none; }
        body, .panel, .topbar, .button, button, #network, .detail-card, .evidence-item { transition: none; }
        .viewer-loading, .viewer-empty-state { transition: none; }
        .viewer-loading__spinner, .detail-skeleton__line { animation: none; }
        .detail-skeleton__line { background: var(--surface-panel); }
      }
      @media (max-width: 1100px) {
        .layout { grid-template-columns: 1fr; }
        #network { height: 70vh; }
        .detail-panel {
          position: fixed;
          top: 0;
          right: 0;
          bottom: 0;
          width: min(360px, 92vw);
          max-height: 100vh;
          z-index: 1200;
          border-radius: 0;
          transform: translateX(101%);
          opacity: 0;
          pointer-events: none;
        }
        .detail-panel.is-mobile-open {
          transform: translateX(0);
          opacity: 1;
          pointer-events: auto;
        }
        .detail-panel-backdrop {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 40, 0.45);
          z-index: 1100;
        }
        .detail-panel-backdrop.is-visible { display: block; }
      }
    </style>
  </head>
  <body>
    __BRAIN_DS_ICON_SPRITE__
    <header class="topbar" aria-label="Organization context bar">
      <div>
        <strong id="org-name">Organization</strong>
        <div class="meta" id="org-meta">0 nodes · 0 edges</div>
      </div>
      <div class="meta" id="org-ts"></div>
    </header>
    <main class="layout">
      <aside class="panel controls" aria-label="Graph controls">
        <section class="search-group" aria-labelledby="search-label">
          <label id="search-label" for="node-search">Search node</label>
          <input id="node-search" type="search" autocomplete="off" placeholder="Type a name or id" />
          <ol id="search-results" aria-live="polite"></ol>
        </section>
        <section>
          <h2>Filters</h2>
          <div class="control-row">
            <button type="button" id="show-all">Show all</button>
            <button type="button" id="hide-all">Hide all</button>
          </div>
          <div id="type-filters"></div>
          <div class="control-row" style="margin-top:0.75rem;align-items:center;gap:0.5rem;">
            <label for="score-threshold-slider" style="white-space:nowrap;font-size:0.875rem;">Score threshold</label>
            <input
              id="score-threshold-slider"
              type="range"
              min="0"
              max="1"
              step="0.05"
              value="0"
              aria-valuemin="0"
              aria-valuemax="1"
              aria-valuenow="0"
              aria-valuetext="0.00"
              style="flex:1;"
            />
            <span id="score-badge" aria-live="polite" style="font-size:0.875rem;min-width:2.5rem;text-align:right;">0.00</span>
          </div>
        </section>
        <section>
          <h2>Legend</h2>
          <div id="legend"></div>
        </section>
        <section>
          <h2>Layout</h2>
          <div class="control-row">
            <button type="button" id="toggle-hierarchical" aria-pressed="true">Hierarchical</button>
            <button type="button" id="toggle-physics" aria-pressed="false">Physics</button>
            <button type="button" id="zoom-fit">Zoom to fit</button>
            <button type="button" id="theme-toggle" class="vis-theme-toggle" aria-label="Switch to light theme">Theme</button>
          </div>
        </section>
      </aside>
      <div class="panel network-shell">
        <div id="network" role="img" aria-label="Organization graph"></div>
        <div id="viewer-loading" class="viewer-loading" aria-hidden="true">
          <svg class="viewer-loading__spinner" aria-hidden="true"><use href="#icon-spinner"/></svg>
        </div>
        <section id="viewer-empty-state" class="viewer-empty-state" aria-hidden="true">
          <div class="viewer-empty-state__card">
            <svg class="viewer-empty-state__icon" aria-hidden="true"><use href="#icon-filter"/></svg>
            <h3 class="viewer-empty-state__title">No nodes visible</h3>
            <p class="viewer-empty-state__text">Try adjusting your filters or score threshold.</p>
            <button type="button" id="empty-reset-filters">Reset filters</button>
          </div>
        </section>
      </div>
      <aside id="detail-panel" class="panel detail-panel is-empty" aria-label="Node details" aria-live="polite" aria-labelledby="detail-title" role="dialog" aria-modal="true">
        <div class="detail-header">
          <h2 id="detail-title" class="detail-title">Node details</h2>
          <div id="detail-meta" class="detail-meta">Select a node to view details</div>
          <div class="detail-actions">
            <button type="button" id="edit-toggle" aria-pressed="false" hidden><svg class="card-icon" aria-hidden="true"><use href="#icon-edit"/></svg> Edit</button>
            <button type="button" id="export-json" hidden><svg class="card-icon" aria-hidden="true"><use href="#icon-save"/></svg> Export JSON</button>
            <button type="button" id="detail-collapse" aria-controls="detail-panel" aria-expanded="true" aria-label="Collapse detail panel">Collapse</button>
            <button type="button" id="detail-close" aria-label="Clear selected node">Close</button>
          </div>
        </div>
        <div id="detail-body" class="detail-body" data-state="empty">Select a node to view details</div>
      </aside>
      <div id="detail-panel-backdrop" class="detail-panel-backdrop" hidden></div>
      <div id="viewer-live-region" class="vis-a11y-sr-only" aria-live="polite" aria-atomic="true"></div>
    </main>
    <script>
      __VIS_NETWORK_JS__
      const RENDER_CONTEXT = __BRAIN_DS_RENDER_CONTEXT__;
      const meta = RENDER_CONTEXT.meta || {};
      const editedData = typeof structuredClone === "function"
        ? structuredClone(RENDER_CONTEXT)
        : JSON.parse(JSON.stringify(RENDER_CONTEXT));
      const typeGroups = RENDER_CONTEXT.type_groups || [];
      document.getElementById("org-name").textContent = meta.org || "Organization";
      document.getElementById("org-meta").textContent = `${meta.node_count || 0} nodes · ${meta.edge_count || 0} edges`;
      document.getElementById("org-ts").textContent = meta.generated_at ? `Generated: ${meta.generated_at}` : "";

      const nodes = new vis.DataSet(RENDER_CONTEXT.nodes || []);
      const edges = new vis.DataSet(RENDER_CONTEXT.edges || []);
      const container = document.getElementById("network");
      const adjacency = RENDER_CONTEXT.adjacency || {};
      const editedDetailIndex = editedData.detail_index || {};
      const originalNodes = new Map((RENDER_CONTEXT.nodes || []).map((n) => [n.id, { ...n }]));
      const originalEdges = new Map((RENDER_CONTEXT.edges || []).map((e, i) => [i, { ...e, id: i }]));
      const hiddenTypes = new Set();
      let scoreThreshold = 0;
      let selectedNodeId = null;

      const network = new vis.Network(container, { nodes, edges }, {
        layout: { hierarchical: { enabled: true, direction: "UD" } },
        interaction: { hover: true, navigationButtons: true, keyboard: true },
        physics: { enabled: false },
        edges: {
          arrows: { to: { enabled: true, scaleFactor: 0.7 } },
          smooth: { enabled: true, type: "cubicBezier" }
        },
        nodes: { shape: "dot", size: 18 }
      });

      const visibleNodeIds = () => new Set((RENDER_CONTEXT.nodes || []).filter((n) => !hiddenTypes.has(n.type)).map((n) => n.id));
      const updateEmptyState = (visibleCount) => {
        if (!viewerEmptyStateEl) return;
        const isEmpty = visibleCount === 0;
        viewerEmptyStateEl.classList.toggle("is-visible", isEmpty);
        viewerEmptyStateEl.setAttribute("aria-hidden", String(!isEmpty));
        if (isEmpty) announceLive("No nodes visible.");
      };
      const applyVisibility = () => {
        const visible = visibleNodeIds();
        updateEmptyState(visible.size);
        nodes.update((RENDER_CONTEXT.nodes || []).map((n) => ({ id: n.id, hidden: !visible.has(n.id), opacity: 1, borderWidth: 1 })));
        // REQ-5.5 / REQ-5.9: edge hidden if either endpoint is hidden OR edge score < threshold (additive).
        // REQ-5.10: inclusive boundary — score >= scoreThreshold is visible.
        edges.update((RENDER_CONTEXT.edges || []).map((e, i) => ({
          id: i,
          hidden: !(visible.has(e.from) && visible.has(e.to)) || ((e.score !== undefined) && (e.score < scoreThreshold)),
          opacity: 1,
        })));
      };

      // applyScoreFilter extracted to interactions/score-filter.ts (PR 5).
      // Use window.brainDsUI.scoreFilter.setThreshold() directly for resets.
      const resetHighlight = () => {
        selectedNodeId = null;
        nodes.update((RENDER_CONTEXT.nodes || []).map((n) => ({ id: n.id, opacity: 1, borderWidth: 1 })));
        edges.update((RENDER_CONTEXT.edges || []).map((_, i) => ({ id: i, opacity: 1 })));
        renderDetailPanel(null);
      };
      const detailPanel = document.getElementById("detail-panel");
      const detailCollapseBtn = document.getElementById("detail-collapse");
      const detailCloseBtn = document.getElementById("detail-close");
      const scoreBadgeEl = document.getElementById("score-badge");
      const scoreSliderEl = document.getElementById("score-threshold-slider");
      const themeToggleBtn = document.getElementById("theme-toggle");
      const detailPanelBackdrop = document.getElementById("detail-panel-backdrop");
      const viewerLoadingEl = document.getElementById("viewer-loading");
      const viewerEmptyStateEl = document.getElementById("viewer-empty-state");
      const emptyResetFiltersBtn = document.getElementById("empty-reset-filters");
      const viewerLiveRegion = document.getElementById("viewer-live-region");
      let detailPanelLastFocus = null;
      let loadingTimer = null;
      let loadingVisible = false;
      let firstFrameDone = false;
      let lastDetailNodeId = null;
      const THEME_STORAGE_KEY = "brain_ds.theme";

      const announceLive = (message) => {
        if (viewerLiveRegion) viewerLiveRegion.textContent = message;
      };

      const setLoadingVisible = (visible) => {
        if (!viewerLoadingEl) return;
        viewerLoadingEl.classList.remove("is-dismissing");
        viewerLoadingEl.classList.toggle("is-visible", visible);
        viewerLoadingEl.setAttribute("aria-hidden", String(!visible));
        loadingVisible = visible;
      };

      const dismissLoading = () => {
        if (!viewerLoadingEl || !loadingVisible) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          setLoadingVisible(false);
          return;
        }
        viewerLoadingEl.classList.add("is-dismissing");
        window.setTimeout(() => {
          setLoadingVisible(false);
          viewerLoadingEl.classList.remove("is-dismissing");
        }, 200);
      };

      const getFocusableInDetailPanel = () => {
        if (!detailPanel) return [];
        const selectors = "button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex='-1'])";
        return Array.from(detailPanel.querySelectorAll(selectors));
      };

      const trapFocusInsideDetailPanel = (event) => {
        if (window.innerWidth >= 1100 || !detailPanel.classList.contains("is-mobile-open") || event.key !== "Tab") return;
        const focusable = getFocusableInDetailPanel();
        if (!focusable.length) return;
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (event.shiftKey && document.activeElement === first) {
          event.preventDefault();
          last.focus();
        } else if (!event.shiftKey && document.activeElement === last) {
          event.preventDefault();
          first.focus();
        }
      };

      const deactivateDetailSlideover = () => {
        if (!detailPanel) return;
        detailPanel.classList.remove("is-mobile-open");
        detailPanel.classList.add("is-collapsed");
        detailPanel.setAttribute("aria-modal", "false");
        if (detailPanelBackdrop) {
          detailPanelBackdrop.classList.remove("is-visible");
          detailPanelBackdrop.hidden = true;
        }
        if (detailPanelLastFocus && typeof detailPanelLastFocus.focus === "function") {
          detailPanelLastFocus.focus();
        }
      };

      const activateDetailSlideover = () => {
        if (!detailPanel) return;
        detailPanelLastFocus = document.activeElement;
        detailPanel.classList.remove("is-collapsed");
        detailPanel.classList.add("is-mobile-open");
        detailPanel.setAttribute("role", "dialog");
        detailPanel.setAttribute("aria-modal", "true");
        if (detailPanelBackdrop) {
          detailPanelBackdrop.hidden = false;
          detailPanelBackdrop.classList.add("is-visible");
        }
        const firstFocusable = getFocusableInDetailPanel()[0];
        if (firstFocusable) firstFocusable.focus();
      };

      const syncDetailPanelPresentation = () => {
        if (!detailPanel) return;
        const isMobile = window.innerWidth < 1100;
        if (!isMobile) {
          detailPanel.classList.remove("is-mobile-open");
          detailPanel.removeAttribute("role");
          detailPanel.removeAttribute("aria-modal");
          if (detailPanelBackdrop) {
            detailPanelBackdrop.classList.remove("is-visible");
            detailPanelBackdrop.hidden = true;
          }
          return;
        }
        const expanded = detailCollapseBtn && detailCollapseBtn.getAttribute("aria-expanded") === "true";
        if (expanded) activateDetailSlideover();
        else deactivateDetailSlideover();
      };

      // Mount the detail-panel module (PR 3 wiring — delegates DOM construction to bundle).
      // window.brainDsUI is set by main.ts (bundle IIFE) before this inline script runs.
      window.brainDsUI.detailPanel.mount(detailPanel, {
        editedDetailIndex,
        editedData,
        network,
        originalNodes,
        RENDER_CONTEXT,
        adjacency,
        motionEnabled: () => !window.matchMedia("(prefers-reduced-motion: reduce)").matches,
      });

      // Keep local refs for renderSelectionPanel (multi-select panel, NOT extracted in PR 3).
      // PR 3 extracts single-node detail rendering only; multi-select stays in template
      // for now and is extracted in a later PR.
      const detailBody = document.getElementById("detail-body");
      const detailTitle = document.getElementById("detail-title");
      const detailMeta = document.getElementById("detail-meta");

      const applyTheme = (themeValue) => {
        const nextTheme = themeValue === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", nextTheme);
        try { localStorage.setItem(THEME_STORAGE_KEY, nextTheme); } catch (e) {}
        if (themeToggleBtn) {
          const targetLabel = nextTheme === "dark" ? "Switch to light theme" : "Switch to dark theme";
          themeToggleBtn.setAttribute("aria-label", targetLabel);
          themeToggleBtn.setAttribute("aria-pressed", String(nextTheme === "light"));
        }
        if (typeof network.refreshThemeTokens === "function") {
          network.refreshThemeTokens();
        }
        const liveRegion = document.querySelector("[aria-live='polite']");
        if (liveRegion) {
          liveRegion.textContent = nextTheme === "light" ? "Switched to light theme" : "Switched to dark theme";
        }
      };

      const toggleTheme = () => {
        const current = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
        applyTheme(current === "light" ? "dark" : "light");
      };

      if (themeToggleBtn) {
        themeToggleBtn.addEventListener("click", toggleTheme);
        applyTheme(document.documentElement.getAttribute("data-theme") || "dark");
      }
      if (detailPanelBackdrop) {
        detailPanelBackdrop.addEventListener("click", () => {
          if (window.innerWidth < 1100) deactivateDetailSlideover();
        });
      }
      if (detailCollapseBtn) {
        detailCollapseBtn.addEventListener("click", () => {
          window.setTimeout(syncDetailPanelPresentation, 0);
        });
      }
      if (detailPanel) {
        detailPanel.addEventListener("keydown", (event) => {
          trapFocusInsideDetailPanel(event);
          if (window.innerWidth < 1100 && event.key === "Escape") {
            event.preventDefault();
            deactivateDetailSlideover();
          }
        });
      }
      window.addEventListener("resize", syncDetailPanelPresentation);
      syncDetailPanelPresentation();
      // Detail-panel logic delegated to window.brainDsUI.detailPanel (PR 3 extraction).
      // renderEvidence, renderRelationships, renderDetailPanel, renderDetailPanelEditable,
      // collapseDetailPanel, toggleEditControls, setEditMode, isFieldEditable etc. are
      // all defined in brain_ds/ui/src/panels/detail-panel.ts and bundled in viewer.bundle.js.
      const setEditMode = (enabled) => window.brainDsUI.detailPanel.setEditMode(enabled);
      const showDetailSkeleton = () => {
        if (!detailBody) return;
        detailBody.setAttribute("data-state", "loading");
        detailBody.innerHTML = '<div class="detail-skeleton" aria-hidden="true"><div class="detail-skeleton__line detail-skeleton__line--1"></div><div class="detail-skeleton__line detail-skeleton__line--2"></div><div class="detail-skeleton__line detail-skeleton__line--3"></div></div>';
      };
      // renderDetailPanel — thin delegation shim to the bundle (PR 3).
      const renderDetailPanel = (nodeId) => {
        const changingNode = Boolean(nodeId && lastDetailNodeId && lastDetailNodeId !== nodeId);
        if (changingNode) showDetailSkeleton();
        const delay = changingNode && !window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 120 : 0;
        window.setTimeout(() => {
          window.brainDsUI.detailPanel.setSelectedNodeId(nodeId);
          window.brainDsUI.detailPanel.renderDetailPanel(nodeId);
          lastDetailNodeId = nodeId || null;
        }, delay);
      };
      const twoHopNeighborhood = (rootId, adj) => {
        const oneHop = new Set(adj[rootId] || []);
        const twoHop = new Set([rootId, ...oneHop]);
        oneHop.forEach((n) => (adj[n] || []).forEach((m) => twoHop.add(m)));
        return twoHop;
      };
      const focusNode = (nodeId) => {
        const node = originalNodes.get(nodeId);
        if (!node) return;
        selectedNodeId = nodeId;
        network.focus(nodeId, { scale: 1.15, animation: true });
        const twoHop = twoHopNeighborhood(nodeId, adjacency);
        _applyNeighborhoodOpacity(twoHop, nodeId, nodes, edges);
        // Delegate render to the mounted detail-panel module (PR 3).
        // The module tracks edit mode internally; setSelectedNodeId + renderDetailPanel
        // lets the module re-render in the correct mode (read/editable).
        const dp = window.brainDsUI.detailPanel;
        dp.setSelectedNodeId(nodeId);
        dp.renderDetailPanel(nodeId);
      };
      // _applyNeighborhoodOpacity: extracted for reuse by Slice 3b union highlights.
      // Opacity map: selected node = 1.0, 1-hop = 1.0, 2-hop = 0.70, rest = 0.25.
      // Edges: 1.0 if both endpoints in twoHopSet, else 0.25.
      function _applyNeighborhoodOpacity(twoHopSet, rootId, nodesDataSet, edgesDataSet) {
        const oneHopSet = new Set(adjacency[rootId] || []);
        nodesDataSet.update(
          (RENDER_CONTEXT.nodes || []).map((n) => {
            let opacity;
            if (n.id === rootId) {
              opacity = 1;
            } else if (oneHopSet.has(n.id)) {
              opacity = 1;
            } else if (twoHopSet.has(n.id)) {
              opacity = 0.70;
            } else {
              opacity = 0.25;
            }
            return { id: n.id, opacity, borderWidth: n.id === rootId ? 4 : 1 };
          })
        );
        edgesDataSet.update(
          (RENDER_CONTEXT.edges || []).map((e, i) => ({
            id: i,
            opacity: twoHopSet.has(e.from) && twoHopSet.has(e.to) ? 1 : 0.25,
          }))
        );
      }

      // Slice 3b: shared-relationship computation (perf guard: called ONLY for ≤10 tier).
      // Returns edges whose both endpoints are in selectionSet.
      const _sharedRelationships = (selectionSet, adj) => {
        const shared = [];
        (RENDER_CONTEXT.edges || []).forEach((e) => {
          if (selectionSet.has(String(e.from)) && selectionSet.has(String(e.to))) {
            shared.push(e);
          }
        });
        return shared;
      };

      // Slice 3b: renderSelectionPanel — tiered detail panel for multi-select.
      // REQ-3.10 / OBS-3.7 / OBS-3.8 / OBS-3.9
      // size === 0: hide panel
      // size === 1: delegate to existing single-node detail card (UNCHANGED path)
      // 2 ≤ size ≤ 10: count + entity-type breakdown + shared relationships + 4 bulk actions
      // size > 10: count + entity-type breakdown ONLY + Clear selection action
      const renderSelectionPanel = (selectedIds) => {
        const size = selectedIds.length;

        if (size === 0) {
          // Hide panel — reset to empty state
          detailPanel.classList.add("is-empty");
          detailBody.setAttribute("data-state", "empty");
          detailTitle.textContent = "Node details";
          detailMeta.textContent = "Select a node to view details";
          detailBody.textContent = "Select a node to view details";
          return;
        }

        if (size === 1) {
          // UNCHANGED single-node path: delegate to focusNode (2-hop highlight + detail panel)
          focusNode(selectedIds[0]);
          return;
        }

        // Multi-select: update 2-hop union highlight (REQ-3.11).
        // Compute union of 2-hop neighborhoods across all selected nodes.
        const unionSet = new Set();
        selectedIds.forEach((id) => {
          twoHopNeighborhood(id, adjacency).forEach((n) => unionSet.add(n));
        });
        // Use null as rootId (no single "selected" node) — _applyNeighborhoodOpacity
        // treats rootId only for borderWidth; pass first id for consistency.
        _applyNeighborhoodOpacity(unionSet, selectedIds[0], nodes, edges);

        // Build selection panel content
        detailPanel.classList.remove("is-empty");
        detailBody.setAttribute("data-state", "ready");
        detailTitle.textContent = `${size} nodes selected`;
        detailMeta.textContent = "Multi-selection";
        detailBody.innerHTML = "";

        // Count section
        const countEl = document.createElement("p");
        countEl.textContent = `${size} nodes selected`;
        detailBody.appendChild(countEl);

        // Entity-type breakdown
        const breakdown = {};
        selectedIds.forEach((id) => {
          const node = originalNodes.get(id);
          if (node) {
            const t = node.type || "Unknown";
            breakdown[t] = (breakdown[t] || 0) + 1;
          }
        });
        const breakdownSection = document.createElement("section");
        breakdownSection.className = "detail-section";
        const breakdownHeading = document.createElement("h3");
        breakdownHeading.textContent = "Entity types";
        breakdownSection.appendChild(breakdownHeading);
        const breakdownList = document.createElement("ul");
        Object.entries(breakdown).forEach(([type, count]) => {
          const li = document.createElement("li");
          li.textContent = `${type}: ${count}`;
          breakdownList.appendChild(li);
        });
        breakdownSection.appendChild(breakdownList);
        detailBody.appendChild(breakdownSection);

        if (size <= 10) {
          // Shared relationships — only for ≤10 tier (perf guard)
          const selectionSet = new Set(selectedIds.map(String));
          const sharedRel = _sharedRelationships(selectionSet, adjacency);
          if (sharedRel.length > 0) {
            const relSection = document.createElement("section");
            relSection.className = "detail-section";
            const relHeading = document.createElement("h3");
            relHeading.textContent = "Shared relationships";
            relSection.appendChild(relHeading);
            const relList = document.createElement("ul");
            sharedRel.forEach((e) => {
              const li = document.createElement("li");
              li.textContent = `${e.from} → ${e.to}${e.label ? " (" + e.label + ")" : ""}`;
              relList.appendChild(li);
            });
            relSection.appendChild(relList);
            detailBody.appendChild(relSection);
          }

          // 4 bulk actions for 2-10 tier (Decision 4)
          const actionsSection = document.createElement("section");
          actionsSection.className = "detail-section";
          const actionsHeading = document.createElement("h3");
          actionsHeading.textContent = "Actions";
          actionsSection.appendChild(actionsHeading);

          const bulkActions = [
            {
              label: "Clear selection",
              "data-bulk-action": "clear-selection",
              handler: () => {
                network.clearSelection();
                const liveRegion = document.querySelector("[aria-live='polite']");
                if (liveRegion) liveRegion.textContent = "Selection cleared";
              },
            },
            {
              label: "Export JSON",
              "data-bulk-action": "export-json",
              handler: () => {
                const selected = selectedIds.map((id) => editedDetailIndex[id] || { id });
                const blob = new Blob([JSON.stringify(selected, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "selection.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
              },
            },
            {
              label: "Focus on selection",
              "data-bulk-action": "focus-selection",
              handler: () => {
                network.fit({ nodes: selectedIds, margin: 40, animation: motionEnabled() });
              },
            },
            {
              label: "Copy IDs",
              "data-bulk-action": "copy-ids",
              handler: () => {
                navigator.clipboard.writeText(selectedIds.join("\n")).then(() => {
                  const liveRegion = document.querySelector("[aria-live='polite']");
                  if (liveRegion) liveRegion.textContent = `Copied ${size} IDs`;
                });
              },
            },
          ];

          const btnRow = document.createElement("div");
          btnRow.className = "detail-actions";
          bulkActions.forEach(({ label, "data-bulk-action": action, handler }) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = label;
            btn.setAttribute("data-bulk-action", action);
            btn.style.minHeight = "44px";
            btn.addEventListener("click", handler);
            btnRow.appendChild(btn);
          });
          actionsSection.appendChild(btnRow);
          detailBody.appendChild(actionsSection);

        } else {
          // size > 10: only Clear selection action (no shared-rel computation)
          const clearBtn = document.createElement("button");
          clearBtn.type = "button";
          clearBtn.textContent = "Clear selection";
          clearBtn.setAttribute("data-bulk-action", "clear-selection");
          clearBtn.style.minHeight = "44px";
          clearBtn.addEventListener("click", () => {
            network.clearSelection();
            const liveRegion = document.querySelector("[aria-live='polite']");
            if (liveRegion) liveRegion.textContent = "Selection cleared";
          });
          detailBody.appendChild(clearBtn);
        }
      };

      // Ensure motionEnabled is accessible to the template (re-read from renderer if needed)
      const motionEnabled = () => !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      // Search panel — delegated to window.brainDsUI.search (PR 4 extraction).
      // Search logic and input event handlers moved to panels/search.ts.
      const searchGroupEl = document.querySelector(".search-group");
      window.brainDsUI.search.mount(searchGroupEl, {
        nodes: RENDER_CONTEXT.nodes || [],
        onSelect: (nodeId) => { focusNode(nodeId); },
        onClear: () => { resetHighlight(); applyVisibility(); },
      });

      // Filter panel — delegated to window.brainDsUI.filterPanel (PR 5 extraction).
      // Type-filter checkbox DOM construction and legend moved to panels/filter-panel.ts.
      const filtersRoot = document.getElementById("type-filters");
      const legendRoot = document.getElementById("legend");
      window.brainDsUI.filterPanel.mount({
        typeGroups,
        filtersRoot,
        legendRoot,
        showAllBtn: document.getElementById("show-all"),
        hideAllBtn: document.getElementById("hide-all"),
        onToggle: (typeName, enabled) => {
          if (enabled) hiddenTypes.delete(typeName); else hiddenTypes.add(typeName);
          applyVisibility();
        },
        onShowAll: () => {
          hiddenTypes.clear();
          window.brainDsUI.scoreFilter.setThreshold(0);
        },
        onHideAll: () => {
          // hide-all types already handled via onToggle calls in filter-panel.ts
          applyVisibility();
        },
      });

      // Score filter — delegated to window.brainDsUI.scoreFilter (PR 5 extraction).
      // Slider 'input' event, aria-valuenow, aria-valuetext, badge update moved to
      // interactions/score-filter.ts. Orphan removal stays in template scope.
      window.brainDsUI.scoreFilter.mount(scoreSliderEl, scoreBadgeEl, {
        onThresholdChange: (threshold) => {
          scoreThreshold = threshold;
          applyVisibility();
          // Orphan removal (PR 3 boundary: renderSelectionPanel stays in template).
          if (typeof network !== "undefined" && network.selectedNodeIds && network.selectedNodeIds.size > 0) {
            const visibleEdgeEndpoints = new Set();
            (RENDER_CONTEXT.edges || []).forEach((e) => {
              if ((e.score === undefined) || (e.score >= scoreThreshold)) {
                visibleEdgeEndpoints.add(e.from);
                visibleEdgeEndpoints.add(e.to);
              }
            });
            const removedFromSelection = [];
            network.selectedNodeIds.forEach((nodeId) => {
              if (!visibleEdgeEndpoints.has(nodeId)) {
                removedFromSelection.push(nodeId);
              }
            });
            if (removedFromSelection.length > 0) {
              removedFromSelection.forEach((nodeId) => network.selectedNodeIds.delete(nodeId));
              const liveRegion = document.querySelector("[aria-live='polite']");
              if (liveRegion) {
                liveRegion.textContent = `${removedFromSelection.length} node(s) removed from selection due to filter`;
              }
              renderSelectionPanel([...network.selectedNodeIds]);
            }
          }
        },
      });

      document.getElementById("toggle-hierarchical").addEventListener("click", (event) => {
        const pressed = event.currentTarget.getAttribute("aria-pressed") === "true";
        const next = !pressed;
        event.currentTarget.setAttribute("aria-pressed", String(next));
        network.setOptions({ layout: { hierarchical: { enabled: next, direction: "UD" } }, physics: { enabled: next ? false : (document.getElementById("toggle-physics").getAttribute("aria-pressed") === "true") } });
      });
      document.getElementById("toggle-physics").addEventListener("click", (event) => {
        const pressed = event.currentTarget.getAttribute("aria-pressed") === "true";
        const next = !pressed;
        event.currentTarget.setAttribute("aria-pressed", String(next));
        network.setOptions({ physics: { enabled: next } });
      });
      document.getElementById("zoom-fit").addEventListener("click", () => network.fit({ animation: true }));
      // editToggleBtn and detailCollapseBtn wiring is now handled inside the mounted
      // detail-panel module (PR 3). The exportJsonBtn wiring remains here because
      // it accesses the full editedData (template-scope dependency).
      const exportJsonBtn = document.getElementById("export-json");
      if (exportJsonBtn) {
        exportJsonBtn.addEventListener("click", () => {
          const payload = JSON.stringify(editedData, null, 2);
          const blob = new Blob([payload], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `graph-edited-${(meta.org || "organization").toLowerCase().replace(/[^a-z0-9_-]+/g, "-")}.json`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        });
      }
      detailCloseBtn.addEventListener("click", () => {
        setEditMode(false);
        resetHighlight();
        applyVisibility();
        detailCloseBtn.blur();
      });
      network.on("click", (params) => {
        if (params.nodes && params.nodes[0]) {
          focusNode(params.nodes[0]);
        } else if (selectedNodeId) {
          resetHighlight();
          applyVisibility();
        }
      });

      // Slice 3b: subscribe to select-change for multi-select tiered panel (REQ-3.10).
      network.on("select-change", ({ nodes: selectedNodeIdList }) => {
        renderSelectionPanel(selectedNodeIdList || []);
      });

      // Ad-hoc neighbor filter state (REQ-6.2 "Show only this node + neighbors").
      // Cleared by "Reset filters" (OBS-6.7).
      let adHocFilterNodeId = null;

      // resetFilters: clears ALL active filters — entity-type, score, and ad-hoc neighbor.
      // Called from canvas context menu "Reset filters" item (REQ-6.3 / OBS-6.7).
      // Type checkboxes and slider DOM now managed by filterPanel + scoreFilter modules (PR 5).
      const resetFilters = () => {
        hiddenTypes.clear();
        window.brainDsUI.filterPanel.setAllChecked(true);
        adHocFilterNodeId = null;
        window.brainDsUI.scoreFilter.setThreshold(0);
      };
      if (emptyResetFiltersBtn) {
        emptyResetFiltersBtn.addEventListener("click", () => {
          resetFilters();
        });
      }

      // Popover content factory — delegated to window.brainDsUI.popover (PR 6 extraction).
      // Wires the content factory into the renderer so popover DOM is built by the module.
      window.brainDsUI.popover.mount({ network, RENDER_CONTEXT });

      // Context menu — delegated to window.brainDsUI.contextMenu (PR 6 extraction).
      // Module handles DOM construction, keyboard nav, click-outside, and network event.
      window.brainDsUI.contextMenu.mount({
        network,
        RENDER_CONTEXT,
        adjacency,
        nodes,
        edges,
        focusNode,
        resetFilters,
        toggleTheme,
      });

      applyVisibility();
      renderDetailPanel(null);
      loadingTimer = window.setTimeout(() => {
        if (!firstFrameDone) setLoadingVisible(true);
      }, 150);
      // FIXED: custom vis.Network doesn't have once() or emit afterDrawing.
      // Mark first frame as done and dismiss loading synchronously.
      // The render loop starts on construction via _wake() -> requestAnimationFrame,
      // so the first frame renders on the next tick regardless.
      firstFrameDone = true;
      if (loadingTimer) {
        window.clearTimeout(loadingTimer);
        loadingTimer = null;
      }
      dismissLoading();
      announceLive("Graph loaded.");
      // toggleEditControls() is now called internally by the detail-panel module.
    </script>
  </body>
</html>
