<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainDS — pick workspace</title>
  <style>
    /* Canonical tokens injected by render_vault_picker_html */
    __BRAIN_DS_TOKENS_CSS__
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-main, #09090b);
      color: var(--text-normal, #f4f4f5);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .picker-shell {
      width: 100%;
      max-width: 540px;
      padding: 2rem 1.5rem;
    }

    .picker-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .picker-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-mora, #a78bfa);
    }

    .picker-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-normal, #f4f4f5);
      letter-spacing: -0.01em;
    }

    /* --- Org list --- */
    .org-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .org-list:empty::after {
      content: "No workspaces found. Create one below.";
      display: block;
      color: var(--text-muted, #71717a);
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }

    .org-row {
      display: block;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      border-radius: 6px;
      background: var(--bg-panel, #121214);
      color: var(--text-normal, #f4f4f5);
      text-decoration: none;
      font-size: 0.9375rem;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }

    .org-row:hover {
      border-color: var(--accent-mora, #a78bfa);
      background: color-mix(in srgb, var(--accent-mora, #a78bfa) 8%, var(--bg-panel, #121214));
    }

    .org-row:focus {
      outline: 2px solid var(--accent-mora, #a78bfa);
      outline-offset: 2px;
      border-color: var(--accent-mora, #a78bfa);
    }

    .workspace-card {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 0.35rem;
    }

    /* Open workspace CTA — primary action (purple/accent) */
    .workspace-open-cta {
      display: block;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      border-radius: 6px;
      background: var(--accent-mora, #a78bfa);
      color: #09090b;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 600;
      transition: opacity 0.15s;
      cursor: pointer;
    }

    .workspace-open-cta:hover { opacity: 0.88; }
    .workspace-open-cta:focus {
      outline: 2px solid var(--accent-mora, #a78bfa);
      outline-offset: 2px;
    }

    /* Workspace heading */
    .workspace-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-normal, #f4f4f5);
      margin: 0;
    }

    /* Manage details block — collapsed at rest */
    .workspace-manage {
      border: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      border-radius: 6px;
      background: var(--bg-secondary, var(--bg-panel, #121214));
    }

    .workspace-manage-summary {
      list-style: none;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted, #71717a);
      user-select: none;
    }

    .workspace-manage-summary::-webkit-details-marker { display: none; }

    .workspace-manage[open] .workspace-manage-summary {
      border-bottom: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
    }

    .workspace-manage-body {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem;
    }

    .workspace-action-btn {
      min-height: 44px;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1;
    }

    /* Secondary (Remove from list) — quiet, NOT primary purple */
    .workspace-action-btn--secondary {
      background: transparent;
      color: var(--text-normal, #f4f4f5);
      border-color: var(--border-subtle, rgba(63,63,70,0.4));
    }

    .workspace-action-btn--secondary:hover,
    .workspace-action-btn--secondary:focus {
      border-color: var(--text-muted, #71717a);
      background: var(--bg-main, #09090b);
    }

    .workspace-action-btn--danger {
      background: transparent;
      color: var(--danger, #f87171);
      border-color: var(--danger-border, rgba(239, 68, 68, 0.3));
    }

    .workspace-action-btn--danger:hover,
    .workspace-action-btn--danger:focus {
      background: var(--danger-soft, rgba(239, 68, 68, 0.1));
      border-color: var(--danger, #f87171);
    }

    .workspace-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .workspace-danger-zone {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1 1 100%;
      padding: 0.15rem 0;
    }

    .workspace-danger-zone > summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
    }

    .workspace-danger-zone > summary::-webkit-details-marker {
      display: none;
    }

    .workspace-danger-form {
      display: grid;
      gap: 0.5rem;
      max-width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--danger-border, rgba(239, 68, 68, 0.3));
      border-radius: 8px;
      background: color-mix(in srgb, var(--danger-soft, rgba(239, 68, 68, 0.1)) 55%, var(--bg-panel, #121214));
    }

    .workspace-danger-copy {
      font-size: 0.8125rem;
      line-height: 1.35;
      color: var(--text-muted, #71717a);
    }

    .workspace-confirm-input {
      width: 100%;
      min-height: 44px;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      background: var(--bg-panel, #121214);
      color: var(--text-normal, #f4f4f5);
      font-size: 0.875rem;
    }

    .workspace-confirm-input:focus {
      outline: 2px solid var(--danger, #f87171);
      outline-offset: 2px;
      border-color: var(--danger, #f87171);
    }

    .workspace-active-ack {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 44px;
      color: var(--text-muted, #71717a);
      font-size: 0.8125rem;
      line-height: 1.35;
    }

    .workspace-active-ack input {
      width: 1rem;
      height: 1rem;
      accent-color: var(--danger, #f87171);
    }

    .workspace-action-status {
      min-height: 1rem;
      font-size: 0.8125rem;
      color: var(--danger, #f87171);
    }

    /* --- Divider --- */
    .picker-divider {
      border: none;
      border-top: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      margin-bottom: 1.5rem;
    }

    .picker-section-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted, #71717a);
      margin-bottom: 0.75rem;
    }

    /* --- Create-org form --- */
    .create-form {
      display: flex;
      gap: 0.5rem;
    }

    .create-input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      background: var(--bg-panel, #121214);
      border: 1px solid var(--border-subtle, rgba(63,63,70,0.4));
      border-radius: 6px;
      color: var(--text-normal, #f4f4f5);
      font-size: 0.9375rem;
      outline: none;
    }

    .create-input:focus {
      border-color: var(--accent-mora, #a78bfa);
      outline: 2px solid var(--accent-mora, #a78bfa);
      outline-offset: 2px;
    }

    .create-input::placeholder {
      color: var(--text-muted, #71717a);
    }

    .create-btn {
      padding: 0.6rem 1.2rem;
      background: var(--accent-mora, #a78bfa);
      color: #09090b;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .create-btn:hover { opacity: 0.88; }
    .create-btn:focus {
      outline: 2px solid var(--accent-mora, #a78bfa);
      outline-offset: 2px;
    }
    .create-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-error {
      margin-top: 0.5rem;
      font-size: 0.8125rem;
      color: #f87171;
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .org-row, .create-btn, .workspace-action-btn { transition: none; }
    }
  </style>
</head>
<body>
  <main class="picker-shell" role="main">
    <header class="picker-header">
      <div class="picker-dot" aria-hidden="true"></div>
      <h1 class="picker-title">BrainDS</h1>
    </header>

    <!-- R8: selectable, focusable org rows (server-rendered) -->
    <ul class="org-list" aria-label="Available workspaces">
      __BRAIN_DS_ORG_ROWS__
    </ul>

    <hr class="picker-divider" />

    <p class="picker-section-label">New workspace</p>

    <!-- R9: create-org form always present -->
    <form
      class="create-form"
      id="create-org-form"
      action="/api/graphs"
      method="post"
      aria-label="Create new workspace"
    >
      <label for="org-label-input" class="visually-hidden">Workspace name</label>
      <input
        id="org-label-input"
        class="create-input"
        type="text"
        name="label"
        placeholder="workspace name"
        autocomplete="off"
        required
        aria-required="true"
      />
      <button type="submit" class="create-btn">Create</button>
    </form>
    <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>

    <hr class="picker-divider" style="margin-top: 1.5rem;" />

    <p class="picker-section-label">Agent / MCP</p>

    <!-- Desktop-side MCP install: writes .mcp.json / .opencode/opencode.json
         for THIS project root via POST /api/setup-mcp (same engine as `brain_ds setup`). -->
    <div class="create-form">
      <button type="button" class="create-btn" id="setup-mcp-btn" style="flex: 1;">
        Configurar MCP para este proyecto
      </button>
    </div>
    <p class="form-error" id="setup-mcp-result" role="status" aria-live="polite"></p>
  </main>

  <script>
    // R11: org selection navigates via native <a href="/?graph_id={id}"> (no JS needed).
    // R12: create-org form uses XHR + navigates to /?graph_id=<new_id> on success.
    // Static fallback (no JS): form POST to /api/graphs works without JavaScript.
    (function () {
      var form = document.getElementById("create-org-form");
      var errEl = document.getElementById("form-error");
      if (!form) return;
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var label = form.querySelector("input[name=label]").value.trim();
        if (!label) {
          errEl.textContent = "Workspace name must not be empty.";
          errEl.style.display = "block";
          return;
        }
        errEl.style.display = "none";
        var btn = form.querySelector("button[type=submit]");
        btn.disabled = true;
        fetch("/api/graphs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ label: label }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (res) {
            if (res.ok) {
              window.location.href = "/?graph_id=" + res.data.id;
            } else {
              errEl.textContent = (res.data && res.data.detail) || "Error creating workspace.";
              errEl.style.display = "block";
              btn.disabled = false;
            }
          })
          .catch(function () {
            errEl.textContent = "Network error. Please retry.";
            errEl.style.display = "block";
            btn.disabled = false;
          });
      });
    })();

    (function () {
      // deleteWorkspace — calls DELETE /api/graphs/{graphId}
      // options.hard=true  → permanent delete (requires typed_confirm in body)
      // options.hard=false → soft hide (reversible, no data loss)
      function deleteWorkspace(graphId, options) {
        var hard = options && options.hard;
        var body = options && options.body ? options.body : null;
        var params = [];
        if (hard) params.push("hard=true");
        params.push("agent_scope=workspace_admin");
        var url = "/api/graphs/" + encodeURIComponent(graphId) + "?" + params.join("&");
        return fetch(url, {
          method: "DELETE",
          headers: body ? { "Content-Type": "application/json" } : {},
          body: body ? JSON.stringify(body) : null,
        }).then(function (response) {
          return response.json().catch(function () { return {}; }).then(function (payload) {
            return { ok: response.ok, status: response.status, payload: payload };
          });
        });
      }

      function removeCard(card) {
        if (card && card.parentNode) {
          card.parentNode.removeChild(card);
        } else {
          window.location.reload();
        }
      }

      function setStatus(statusEl, message, isError) {
        if (!statusEl) return;
        statusEl.textContent = message || "";
        statusEl.style.color = isError ? "var(--danger, #f87171)" : "var(--text-normal, #f4f4f5)";
      }

      document.querySelectorAll("[data-workspace-remove]").forEach(function (button) {
        button.addEventListener("click", function () {
          var graphId = button.getAttribute("data-graph-id") || button.getAttribute("data-workspace-path") || "";
          if (!graphId) return;
          button.disabled = true;
          var card = button.closest(".workspace-card") || button.closest("[data-graph-id]");
          deleteWorkspace(graphId, { hard: false, body: {
            active_graph_id: button.getAttribute("data-active-graph-id") || "",
            active_acknowledged: button.getAttribute("data-active-workspace") !== "true"
          } }).then(function (result) {
            if (result.ok) {
              removeCard(card);
            } else {
              var statusEl = card && card.querySelector(".workspace-action-status");
              setStatus(statusEl, (result.payload && result.payload.detail) || "Unable to remove workspace.", true);
              button.disabled = false;
            }
          }).catch(function () {
            button.disabled = false;
          });
        });
      });

      document.querySelectorAll(".workspace-danger-form").forEach(function (form) {
        var input = form.querySelector("input[name='typed_confirm']");
        var submit = form.querySelector("button[type='submit']");
        var statusEl = form.querySelector(".workspace-action-status");
        var activeAck = form.querySelector("input[name='active_acknowledged']");
        var graphId = form.getAttribute("data-graph-id") || form.getAttribute("data-workspace-path") || "";
        var name = form.getAttribute("data-workspace-name") || "";
        var isActive = form.getAttribute("data-active-workspace") === "true";

        function sync() {
          var value = (input && input.value || "").trim();
          var activeOk = !isActive || !!(activeAck && activeAck.checked);
          if (submit) {
            submit.disabled = !(value === graphId || value === name) || !activeOk;
          }
          setStatus(statusEl, value && value !== graphId && value !== name
            ? "Type the exact workspace name or id to confirm."
            : (isActive && !activeOk ? "Acknowledge that this is the active workspace before deleting." : ""), true);
        }

        if (input) {
          input.addEventListener("input", sync);
          sync();
        }
        if (activeAck) activeAck.addEventListener("change", sync);

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          var value = (input && input.value || "").trim();
          if (!(value === graphId || value === name)) {
            setStatus(statusEl, "Confirmation text does not match.", true);
            return;
          }
          if (isActive && !(activeAck && activeAck.checked)) {
            setStatus(statusEl, "Acknowledge that this is the active workspace before deleting.", true);
            return;
          }
          if (submit) submit.disabled = true;
          var card = form.closest(".workspace-card") || form.closest("[data-graph-id]");
          deleteWorkspace(graphId, { hard: true, body: {
            typed_confirm: value,
            active_graph_id: form.getAttribute("data-active-graph-id") || "",
            active_acknowledged: !isActive || !!(activeAck && activeAck.checked)
          } }).then(function (result) {
            if (result.ok) {
              removeCard(card);
              return;
            }
            setStatus(statusEl, (result.payload && result.payload.detail) || "Unable to delete workspace.", true);
            if (submit) submit.disabled = false;
          }).catch(function () {
            setStatus(statusEl, "Network error while deleting workspace.", true);
            if (submit) submit.disabled = false;
          });
        });
      });
    })();

    // Agent/MCP setup from inside the desktop: one click writes the configs.
    (function () {
      var btn = document.getElementById("setup-mcp-btn");
      var out = document.getElementById("setup-mcp-result");
      if (!btn || !out) return;
      btn.addEventListener("click", function () {
        btn.disabled = true;
        out.style.display = "block";
        out.style.color = "var(--text-muted, #71717a)";
        out.textContent = "Configurando…";
        fetch("/api/setup-mcp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agent: "both" }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
          .then(function (res) {
            btn.disabled = false;
            if (res.ok) {
              out.style.color = "var(--text-normal, #f4f4f5)";
              out.textContent = "Listo: " + res.data.written.join(", ") + " — reinicia tu agente (Claude Code / OpenCode) y aprueba brain_ds.";
            } else {
              out.style.color = "#f87171";
              out.textContent = (res.data && res.data.detail) || "Error al configurar MCP.";
            }
          })
          .catch(function () {
            btn.disabled = false;
            out.style.color = "#f87171";
            out.textContent = "Error de red al configurar MCP.";
          });
      });
    })();
  </script>
</body>
</html>
