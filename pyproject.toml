[project]
name = "brain_ds"
version = "0.1.0"
description = "Enterprise Data & Knowledge Mapper"
requires-python = ">=3.11"
dependencies = [
]

[project.optional-dependencies]
simple = [
  "pyvis>=0.3",
]

[project.scripts]
brain_ds = "brain_ds.ui.__main__:main"

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["brain_ds*"]

[tool.setuptools.package-data]
"brain_ds.ui" = [
  "templates/*.html",
  "assets/*.css",
  "assets/*.js",
]
