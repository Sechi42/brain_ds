name: build-macos-exe

# Security posture (mirrors build-windows-exe.yml):
# - All actions pinned to full commit SHAs (no mutable tags).
# - Top-level permissions empty; each job grants only what it needs.
# - Package-manager lifecycle scripts disabled globally (clean libraries).
# - Locked installs only: uv.lock for Python, --locked for cargo installs.
# - The .dmg is uploaded to a DRAFT release, never as a public Actions
#   artifact: drafts are visible only to users with write access, so on this
#   public repo only the owner can download the binary.
# - macOS is a draft-only, UNSIGNED target. The .dmg/.app are not notarized;
#   Gatekeeper will warn on first open (see INSTALL.md macOS notes).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Supply-chain hardening: never run npm/pnpm lifecycle scripts.
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  PNPM_CONFIG_IGNORE_SCRIPTS: "true"
  UV_NO_PROGRESS: "1"

jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Run test suite
        run: uv run python -m pytest tests/ -q

  build-exe:
    # Build + private delivery only for trusted refs (merge to main or manual
    # dispatch). PRs get the test job, never release credentials.
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    permissions:
      contents: write # required to create the draft release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Select stable Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Cache cargo registry and tauri build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install Tauri CLI (locked)
        run: |
          if ! cargo tauri --version >/dev/null 2>&1; then
            cargo install tauri-cli --version "^2.0.0" --locked
          fi
          cargo tauri --version

      - name: Install pnpm (exact pinned version)
        # Pinned to the version in brain_ds/ui/package.json packageManager.
        # The workflow and build script both rebuild from the checked-out commit
        # before packaging, so the app cannot reuse stale release assets.
        run: |
          npm install -g pnpm@11.0.8
          pnpmVersion="$(pnpm --version | tr -d '[:space:]')"
          if [ "$pnpmVersion" != "11.0.8" ]; then
            echo "Expected pnpm 11.0.8 but found $pnpmVersion" >&2
            exit 1
          fi

      - name: Rebuild and verify fresh UI bundle
        run: |
          pnpm --dir brain_ds/ui install --frozen-lockfile
          pnpm --dir brain_ds/ui run build
          uv run python -m brain_ds.ui.bundle_freshness --ui-root brain_ds/ui
          git diff --exit-code -- brain_ds/ui/assets/viewer.bundle.js brain_ds/ui/assets/viewer.bundle.css

      - name: Build macOS bundle
        run: bash ./scripts/build-macos.sh

      - name: Upload .dmg to draft release (owner-only download)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg="$(ls dist/*.dmg 2>/dev/null | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "No .dmg found in dist/" >&2
            exit 1
          fi
          # Deterministic, collision-proof asset name: product, arch, run number.
          arch="$(uname -m)"
          asset="dist/brain_ds-macos-${arch}-build-${GITHUB_RUN_NUMBER}.dmg"
          cp "$dmg" "$asset"
          tag="macos-exe-build-${GITHUB_RUN_NUMBER}"
          notes="$(printf 'Commit: %s\nWorkflow run: %s/%s/actions/runs/%s\nUnsigned/non-notarized draft build - Gatekeeper will warn on first open.' "$GITHUB_SHA" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          gh release create "$tag" "$asset" \
            --draft \
            --title "BrainDS macOS build #${GITHUB_RUN_NUMBER}" \
            --notes "$notes"
          echo "Draft release created: $tag (visible solo para colaboradores con write access)"
