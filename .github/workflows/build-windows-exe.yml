name: build-windows-exe

# Security posture:
# - All actions pinned to full commit SHAs (no mutable tags).
# - Top-level permissions empty; each job grants only what it needs.
# - Package-manager lifecycle scripts disabled globally (clean libraries).
# - Locked installs only: uv.lock for Python, --locked for cargo installs.
# - Dual delivery (mirrors build-macos-exe.yml):
#   * On push to main / workflow_dispatch (no tag): the installer .exe is
#     uploaded to a per-run DRAFT release (exe-build-<run>), owner-only download.
#   * On a release-please tag (brain_ds-v*.*.*): the installer is attached to the
#     release-please-created GitHub release for that version.

on:
  push:
    branches: [main]
    # release-please.yml owns versioning + tag creation; on a brain_ds-v*.*.* tag this
    # workflow attaches the Windows installer to that release. On push to main
    # it produces a draft build like macOS so Windows always has a fresh binary.
    tags: ['brain_ds-v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Supply-chain hardening: never run npm/pnpm lifecycle scripts.
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  PNPM_CONFIG_IGNORE_SCRIPTS: "true"
  UV_NO_PROGRESS: "1"

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Run test suite
        run: uv run python -m pytest tests/ -q

  build-exe:
    # Build + private delivery only for trusted refs (merge to main or manual
    # dispatch). PRs get the test job, never release credentials.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: write # required to create the draft release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Select stable Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Cache cargo registry and tauri build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install Tauri CLI (locked)
        shell: pwsh
        run: |
          cmd /c "cargo tauri --version >nul 2>nul"
          if ($LASTEXITCODE -ne 0) {
            cargo install tauri-cli --version "^2.0.0" --locked
          }
          cargo tauri --version

      - name: Install pnpm (exact pinned version)
        shell: pwsh
        # Pinned to the version in brain_ds/ui/package.json packageManager.
        # The workflow and build script both rebuild from the checked-out commit
        # before packaging, so the exe cannot reuse stale release assets.
        run: |
          npm install -g pnpm@11.0.8
          $pnpmVersion = (pnpm --version).Trim()
          if ($pnpmVersion -ne "11.0.8") {
            throw "Expected pnpm 11.0.8 but found $pnpmVersion"
          }

      - name: Rebuild and verify fresh UI bundle
        shell: pwsh
        run: |
          pnpm --dir brain_ds/ui install --frozen-lockfile
          pnpm --dir brain_ds/ui run build
          uv run python -m brain_ds.ui.bundle_freshness --ui-root brain_ds/ui
          git diff --exit-code -- brain_ds/ui/assets/viewer.bundle.js brain_ds/ui/assets/viewer.bundle.css

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-exe.ps1

      - name: Upload installer to release-please release (tag)
        # On a release-please tag, attach the installer to that version's release.
        if: startsWith(github.ref, 'refs/tags/brain_ds-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem dist/*setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer found in dist/" }
          $tag = $env:GITHUB_REF_NAME  # e.g. brain_ds-v0.2.0
          gh release upload $tag $exe.FullName --clobber
          Write-Output "Installer uploaded to release $tag"

      - name: Upload installer to draft release (owner-only download)
        # On push to main / workflow_dispatch (no tag): publish a per-run draft
        # build so Windows always ships a fresh binary, mirroring build-macos-exe.yml.
        if: ${{ !startsWith(github.ref, 'refs/tags/brain_ds-v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem dist/*setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer found in dist/" }
          # Deterministic, collision-proof asset name: product + run number.
          $asset = "dist/BrainDS-windows-build-$($env:GITHUB_RUN_NUMBER)-setup.exe"
          Copy-Item $exe.FullName $asset
          $tag = "exe-build-$($env:GITHUB_RUN_NUMBER)"
          $notes = "Commit: $($env:GITHUB_SHA)`nWorkflow run: $($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"
          gh release create $tag $asset --draft --title "BrainDS Windows build #$($env:GITHUB_RUN_NUMBER)" --notes $notes
          Write-Output "Draft release created: $tag (visible solo para colaboradores con write access)"
