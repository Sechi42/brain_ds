name: build-windows-exe

# Security posture:
# - All actions pinned to full commit SHAs (no mutable tags).
# - Top-level permissions empty; each job grants only what it needs.
# - Package-manager lifecycle scripts disabled globally (clean libraries).
# - Locked installs only: uv.lock for Python, --locked for cargo installs.
# - The installer .exe is uploaded to the release-please-created GitHub release
#   for the semver tag (v*.*.*). One release per version — no competing drafts.
#   On workflow_dispatch (no tag), the upload step is skipped.

on:
  push:
    # Triggered by release-please tags (v*.*.*) — NOT on every push to main.
    # release-please.yml owns versioning + tag creation; this workflow attaches
    # the Windows installer to the release-please-created GitHub release.
    # Avoids double-release: no competing draft-release from run numbers.
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Supply-chain hardening: never run npm/pnpm lifecycle scripts.
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  PNPM_CONFIG_IGNORE_SCRIPTS: "true"
  UV_NO_PROGRESS: "1"

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Run test suite
        run: uv run python -m pytest tests/ -q

  build-exe:
    # Build + private delivery only for trusted refs (merge to main or manual
    # dispatch). PRs get the test job, never release credentials.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: write # required to create the draft release
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Select stable Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Cache cargo registry and tauri build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install Tauri CLI (locked)
        shell: pwsh
        run: |
          cmd /c "cargo tauri --version >nul 2>nul"
          if ($LASTEXITCODE -ne 0) {
            cargo install tauri-cli --version "^2.0.0" --locked
          }
          cargo tauri --version

      - name: Install pnpm (exact pinned version)
        shell: pwsh
        # Pinned to the version in brain_ds/ui/package.json packageManager.
        # The build script then runs: frozen-lockfile install (no lifecycle
        # scripts) + audit gate + bundle build, so the exe always ships a
        # fresh, clean-tree UI bundle.
        run: |
          npm install -g pnpm@11.0.8
          $pnpmVersion = (pnpm --version).Trim()
          if ($pnpmVersion -ne "11.0.8") {
            throw "Expected pnpm 11.0.8 but found $pnpmVersion"
          }

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-exe.ps1

      - name: Upload installer to release-please release
        # Attaches the Windows installer to the GitHub release that release-please
        # already created for this tag. One release per version, no competing drafts.
        # On workflow_dispatch (no tag), this step uploads nothing (no release exists).
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem dist/*setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer found in dist/" }
          $tag = $env:GITHUB_REF_NAME  # e.g. v0.1.1
          gh release upload $tag $exe.FullName --clobber
          Write-Output "Installer uploaded to release $tag"
