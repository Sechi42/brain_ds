<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brain_ds desktop bootstrap</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Segoe UI, system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .panel {
        width: min(560px, 92vw);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 28px rgb(0 0 0 / 35%);
      }

      button {
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.6;
        cursor: wait;
      }

      .status {
        margin-top: 16px;
        color: #cbd5e1;
      }

      .error {
        margin-top: 16px;
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>brain_ds desktop</h1>
      <p>Open a project folder to launch the local graph server.</p>
      <button id="open-project" type="button">Open project</button>
      <p id="status" class="status" hidden>Starting local server…</p>
      <p id="error" class="error" hidden></p>
    </main>
    <script src="./bootstrap.js"></script>
  </body>
</html>
