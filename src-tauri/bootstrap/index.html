<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brain_ds</title>
    <style>
      /*
       * Carbon/zinc design tokens — inline copy for bootstrap splash.
       * Canonical source: brain_ds/ui/static/tokens.css
       * Keep this set minimal; update both if token values change.
       */
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;

        --bg-main: #09090b;
        --bg-panel: #121214;
        --text-normal: #f4f4f5;
        --text-muted: #71717a;
        --accent-mora: #a78bfa;
        --border-subtle: rgba(63, 63, 70, 0.4);
        --radius-md: 8px;
        --fw-semibold: 600;
      }

      body {
        margin: 0;
        background: var(--bg-main);
        color: var(--text-normal);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .panel {
        width: min(480px, 92vw);
        background: var(--bg-panel);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 32px 28px;
        box-shadow: 0 8px 28px rgb(0 0 0 / 45%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-mora);
        flex-shrink: 0;
      }

      .brand-name {
        font-size: 1.15rem;
        font-weight: var(--fw-semibold);
        color: var(--text-normal);
        letter-spacing: -0.01em;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: var(--fw-semibold);
        color: var(--text-normal);
        line-height: 1.3;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      button {
        background: var(--accent-mora);
        color: #09090b;
        border: 0;
        border-radius: var(--radius-md);
        padding: 10px 18px;
        font-weight: var(--fw-semibold);
        font-size: 0.9rem;
        cursor: pointer;
        transition: opacity 150ms ease;
      }

      button:hover {
        opacity: 0.88;
      }

      button[disabled] {
        opacity: 0.5;
        cursor: wait;
      }

      /* Loading indicator — spinning ring */
      .loading-ring {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid var(--border-subtle);
        border-top-color: var(--accent-mora);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      .error {
        color: #fca5a5;
        font-size: 0.875rem;
      }

      [hidden] {
        display: none !important;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* R3: degrade animation to static indicator when prefers-reduced-motion is set */
      @media (prefers-reduced-motion: reduce) {
        .loading-ring {
          animation: none;
          border-color: var(--accent-mora);
          opacity: 0.6;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">brain_ds</span>
      </div>
      <h1>Open a project</h1>
      <p>Select a project folder to launch the local knowledge graph server.</p>
      <button id="open-project" type="button">Open project folder</button>
      <div id="status" class="status" hidden>
        <span class="loading-ring" aria-hidden="true"></span>
        <span>Starting local server…</span>
      </div>
      <p id="error" class="error" hidden></p>
    </main>
    <script src="./bootstrap.js"></script>
  </body>
</html>
